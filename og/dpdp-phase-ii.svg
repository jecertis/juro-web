<!-- OG image source for dpdp-phase-ii blog post.
     NOTE: A PNG version (1200×630) must be generated from this SVG before launch.
     Example: `npx svgexport og/dpdp-phase-ii.svg og/dpdp-phase-ii.png 1200:630`
     or use a headless browser / Figma export.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Yellow left accent bar -->
  <rect x="72" y="200" width="4" height="120" fill="#F5C400" rx="2"/>

  <!-- Yellow eyebrow label -->
  <text
    x="96" y="232"
    font-family="'IBM Plex Mono', monospace"
    font-size="18"
    font-weight="400"
    fill="#F5C400"
    letter-spacing="0.08em"
    text-transform="uppercase">DPDP · INDIA SAAS · COMPLIANCE</text>

  <!-- Main headline -->
  <text
    x="96" y="300"
    font-family="'IBM Plex Mono', monospace"
    font-size="64"
    font-weight="600"
    fill="#F5C400"
    letter-spacing="-0.03em">DPDP Phase II</text>

  <!-- Subtext line 1 -->
  <text
    x="96" y="368"
    font-family="'IBM Plex Mono', monospace"
    font-size="28"
    font-weight="400"
    fill="#ffffff">Consent Manager Requirements</text>

  <!-- Subtext line 2 -->
  <text
    x="96" y="408"
    font-family="'IBM Plex Mono', monospace"
    font-size="28"
    font-weight="400"
    fill="#ffffff">Before November 2026</text>

  <!-- Domain branding -->
  <text
    x="96" y="540"
    font-family="'IBM Plex Mono', monospace"
    font-size="18"
    font-weight="400"
    fill="rgba(255,255,255,0.45)">jurocompliant.com</text>
</svg>
