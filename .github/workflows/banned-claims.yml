name: Workspace compliance checks

on:
  pull_request:
    paths:
      - 'README.md'
      - 'package.json'
      - '*.html'
      - 'index.html'
      - 'jurocompliant.html'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.github/scripts/**'
      - '.github/contracts/**'
      - '.github/workflows/banned-claims.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout juro-web
        uses: actions/checkout@v5

      - name: Make scripts executable
        # Scripts are vendored from juro-platform/scripts/. juro-platform
        # is private, so cross-repo checkout would require a PAT secret.
        # See .github/scripts/check-banned-claims.sh header for re-vendor
        # protocol when the canonical list changes.
        run: chmod +x .github/scripts/check-banned-claims.sh .github/scripts/check-agent-preamble.sh

      - name: Collect files for banned-claims check
        id: files
        run: |
          set -e
          files=()
          [[ -f README.md ]] && files+=("README.md")
          [[ -f package.json ]] && files+=("package.json")
          while IFS= read -r -d '' f; do files+=("$f"); done < <(find . -maxdepth 2 -name '*.html' -not -path './node_modules/*' -print0 2>/dev/null || true)
          printf '%s\n' "${files[@]}" > files.txt
          cat files.txt

      - name: Run banned-claims check
        run: xargs -a files.txt .github/scripts/check-banned-claims.sh

      - name: Run agent-preamble check
        run: .github/scripts/check-agent-preamble.sh CLAUDE.md AGENTS.md
