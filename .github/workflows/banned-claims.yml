name: Workspace compliance checks

on:
  pull_request:
    paths:
      - 'README.md'
      - 'package.json'
      - '*.html'
      - 'index.html'
      - 'jurocompliant.html'
      - 'CLAUDE.md'
      - 'AGENTS.md'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout juro-web
        uses: actions/checkout@v5

      - name: Checkout juro-platform (for check scripts)
        uses: actions/checkout@v5
        with:
          repository: jecertis/juro-platform
          path: juro-platform

      - name: Make scripts executable
        run: chmod +x juro-platform/scripts/check-banned-claims.sh juro-platform/scripts/check-agent-preamble.sh

      - name: Collect files for banned-claims check
        id: files
        run: |
          set -e
          files=()
          [[ -f README.md ]] && files+=("README.md")
          [[ -f package.json ]] && files+=("package.json")
          while IFS= read -r -d '' f; do files+=("$f"); done < <(find . -maxdepth 2 -name '*.html' -not -path './node_modules/*' -print0 2>/dev/null || true)
          printf '%s\n' "${files[@]}" > files.txt
          cat files.txt

      - name: Run banned-claims check
        run: xargs -a files.txt juro-platform/scripts/check-banned-claims.sh

      - name: Run agent-preamble check
        run: juro-platform/scripts/check-agent-preamble.sh CLAUDE.md AGENTS.md
