name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oP '"tag_name": "\K(.*)(?=")' | tr -d '"')
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz -C /usr/local/bin/
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --no-git --redact --verbose --ignore-file=.gitleaksignore || true
          gitleaks detect --source . --no-git --redact --ignore-file=.gitleaksignore || exit 1
