name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --no-git --redact --verbose --ignorefile=.gitleaksignore || true
          gitleaks detect --source . --no-git --redact --ignorefile=.gitleaksignore || exit 1
